name: Test

# 依存ゼロ。診断ロジックの単体テストと構文チェックを実行する。
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Syntax check
        run: npm run check
      - name: Type check
        run: npm run typecheck
      - name: Unit & DOM tests
        run: npm test
