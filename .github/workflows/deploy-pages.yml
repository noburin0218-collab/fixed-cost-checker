name: Deploy to GitHub Pages

# main への push で静的サイト（リポジトリのルート）を GitHub Pages へ公開します。
# 事前に一度だけ、リポジトリの Settings → Pages → Source を「GitHub Actions」に設定してください。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1つに制限（実行中のデプロイはキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリのルート（index.html がある場所）を公開
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
